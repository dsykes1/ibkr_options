  option_type: put
  expiration_scope: weekly
  currency: USD
  ranking_mode: capital_efficient
  portfolio_targets:
    weekly_return_target_pct: 0.5
    min_pop: 0.85
    allow_partial_target: true
    reject_if_target_requires_low_quality_trades: true
  universe_discovery:
    enabled: true
    use_configured_universe_first: true
    include_sp500: true
    include_nasdaq100: true
    include_etfs: true
    exclude_leveraged_etfs: false
    min_underlying_volume: null
    max_symbols: 344
  symbol_metadata:
    TQQQ:
      sector: ETF
      themes:
        - leveraged_etf
        - nasdaq_100
        - high_beta
      assignment_plan: Avoid assignment when possible; if assigned, treat as a tactical leveraged index position and consider rapid exit or covered calls only at conservative size.
    SOXL:
      sector: ETF
      themes:
        - leveraged_etf
        - semiconductors
        - high_beta
      assignment_plan: Avoid assignment when possible; if assigned, treat as tactical semiconductor leverage and reduce quickly or sell covered calls only with strict size limits.
    IREN:
      sector: Technology
      themes:
        - bitcoin_mining
        - ai_infrastructure
        - crypto_beta
        - high_beta
      assignment_plan: Only accept assignment if comfortable owning a volatile crypto/AI infrastructure equity; otherwise close or roll before expiration.
    CRWV:
      sector: Technology
      themes:
        - ai_infrastructure
        - cloud_compute
        - high_beta
      assignment_plan: Only accept assignment if comfortable owning a volatile AI infrastructure equity; otherwise close or roll before expiration.
  default_filters:
    min_underlying_price: 10
    max_underlying_price: null
    min_option_volume: 10
    min_open_interest: 100
    max_bid_ask_spread_pct: 5
    min_days_to_expiration: 1
    max_days_to_expiration: 7
    exclude_earnings_within_days: 7
  ranking_modes:
    ultra_safe:
      name: ultra_safe
      enabled: true
      description: Prioritize conservative cash-secured put candidates.
      min_premium: 20
      min_annualized_return_pct: 8
      max_delta: 0.25
      prefer_lower_assignment_risk: true
    capital_efficient:
      name: capital_efficient
      enabled: true
      description: Prioritize efficient use of available cash while staying within risk limits.
      min_premium: 15
      min_annualized_return_pct: 12
      max_delta: 0.35
      open_interest_contract_limit_pct: 1.0
      prefer_lower_assignment_risk: false
