  name: ibkr-options
  environment: development
  log_level: INFO

ibkr:
  host: 127.0.0.1
  port: 7496
  client_id: 1

market_data:
  default_type: live
  allow_delayed_fallback: false
  reject_if_delayed: true
  require_bid_ask: true
  require_greeks: true
  require_iv: true
  require_open_interest: true
  require_option_volume: false

